name: 🐍 Gerar cobra das contribuições

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Gera o SVG da cobra (tema fogo)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            snake.svg?color_snake=%23ff3b18&color_dots=%236b3a1a,%23a84410,%23d2510c,%23ff8a1e,%23ffc861&dark_color_snake=%23ff3b18&dark_color_dots=%236b3a1a,%23a84410,%23d2510c,%23ff8a1e,%23ffc861

      - name: Publica no branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
